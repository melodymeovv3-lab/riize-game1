<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>韩娱嫂子模拟器 · RIIZE 修复完整版</title>
<style>
body{margin:0;background:radial-gradient(circle at top,#2b3555,#0d0f15 60%,#05060a);color:#fff7f4;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(#151823,#0e1016)}
.top{position:sticky;top:0;z-index:5;background:rgba(15,16,22,.96);backdrop-filter:blur(12px);border-bottom:1px solid #33384a;padding:12px}
h1{font-size:17px;margin:0}.badge{float:right;font-size:11px;border:1px solid #33384a;border-radius:99px;padding:4px 8px;color:#ddd}
.tabs{display:flex;gap:6px;margin-top:10px;overflow:auto}.tabs button{white-space:nowrap;font-size:12px;padding:8px 10px;margin:0}
main{padding:14px 12px 86px}.card{background:#1a1d29;border:1px solid #33384a;border-radius:22px;padding:15px;margin:12px 0;box-shadow:0 16px 40px #0005}
.cover{height:190px;border-radius:20px;background:radial-gradient(circle at 25% 30%,#ff8aa899,transparent 25%),radial-gradient(circle at 75% 38%,#8fc7ff77,transparent 28%),linear-gradient(135deg,#27304b,#11131d);display:flex;align-items:end;padding:16px;margin-bottom:12px}
.cover b{font-size:20px;line-height:1.25}.small{font-size:12px;color:#b9b2be;line-height:1.6}
.notice{font-size:12px;line-height:1.6;background:#2b2430;border:1px solid #574053;border-radius:16px;padding:10px;color:#eadde6}
label{display:block;font-size:12px;color:#b9b2be;margin:10px 0 5px}
input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #33384a;background:#0f1118;color:#fff;border-radius:15px;padding:11px;font-size:15px}
textarea{min-height:82px}
button{width:100%;border:0;border-radius:16px;background:linear-gradient(135deg,#ff8aa8,#8fc7ff);color:#111;padding:12px;font-weight:800;font-size:15px;margin-top:9px}
.secondary{background:#1b1d28;color:#fff;border:1px solid #33384a}.ghost{background:transparent;color:#ddd;border:1px dashed #55586a}
.hidden{display:none}.story{white-space:pre-wrap;line-height:1.82;font-size:15.5px}
.choice{background:#151722;color:#fff;border:1px solid #33384a;text-align:left;line-height:1.55}
.pill{display:inline-block;font-size:11px;border:1px solid #33384a;border-radius:99px;padding:5px 8px;margin:0 5px 8px 0;color:#ddd}
.stat{margin:10px 0}.stat b{font-size:13px}.num{float:right;color:#b9b2be;font-size:12px}
.bar{height:8px;background:#2c3042;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;background:linear-gradient(90deg,#ff8aa8,#8fc7ff)}
.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;max-width:430px;width:100%;background:rgba(17,19,26,.96);border-top:1px solid #33384a;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px;box-sizing:border-box}
.bottom button{font-size:13px;padding:10px;margin:0}
.person{background:#151722;border:1px solid #33384a;border-radius:16px;padding:10px;margin:8px 0}
.person span{display:block;color:#b9b2be;font-size:12px;line-height:1.5;margin-top:5px}
.logitem{border-bottom:1px solid #33384a;padding:10px 0;color:#bbb;font-size:12px;line-height:1.5}
</style>
</head>
<body>
<div class="app">
<div class="top">
<h1>韩娱嫂子模拟器 · RIIZE <span id="status" class="badge">最终修复版</span></h1>
<div class="tabs">
<button onclick="showPage('game')">剧情</button>
<button onclick="showPage('stats')">属性</button>
<button onclick="showPage('profile')">角色卡</button>
<button onclick="showPage('save')">存档</button>
</div>
</div>

<main>
<section id="cover" class="card">
<div class="cover"><b>首尔夜路、练习室镜墙、音乐节目侧门<br>和不能被看见的心动</b></div>
<h2>韩娱嫂子模拟器 · RIIZE定向版</h2>
<p class="small">平行世界虚构同人文游。剧情、恋爱线、公司安排、粉圈舆论、人物心理均为虚构创作，不代表现实艺人经历、私生活或真实性格。</p>
<div class="notice">最终修复版：不随机重复，不会卡咖啡/便利店/录音室；剧情会按固定周目推进。</div>
<button onclick="startCreate()">开始游戏</button>
</section>

<section id="setup" class="card hidden">
<h2>角色创建</h2>
<label>姓名</label><input id="pName" value="77">
<label>年龄</label><input id="pAge" value="19">
<label>玩家身份起源</label>
<select id="origin">
<option>留学生</option><option>布栗子 / 海外粉丝</option><option>娱乐公司实习生</option><option>音乐节目工作人员</option><option>造型 / 妆发助理</option><option>翻译 / 海外商务助理</option><option>校园文化活动志愿者</option><option>咖啡店 / 便利店 / 花店兼职生</option><option>自定义身份</option>
</select>
<label>选择男主</label>
<select id="lead">
<option value="shotaro">大崎将太郎（Shotaro）</option><option value="eunseok">宋银硕（Eunseok）</option><option value="sungchan">郑成灿（Sungchan）</option><option value="wonbin">朴元彬（Wonbin）</option><option value="sohee">李炤熙（Sohee）</option><option value="anton">李灿荣（Anton）</option>
</select>
<label>追星程度</label>
<select id="fan">
<option>布栗子老粉</option><option>普通韩娱瓜众</option><option>纯路人，无感</option><option>曾经短暂关注，重新遇见后心情复杂</option><option>只喜欢某一位成员，身份更敏感</option>
</select>
<label>剧情节奏</label>
<select id="pace">
<option>慢热现实向</option><option>标准韩剧向</option><option>高压舆论向</option><option>青春成长向</option><option>都市群像向</option>
</select>
<label>前情补充</label>
<textarea id="backstory" placeholder="可写：偶然相遇、青梅竹马、隐婚、已恋爱多年、刚认识、工作关系等。不填则普通初遇。"></textarea>
<button onclick="makeProfile()">确定</button>
</section>

<section id="confirm" class="card hidden"><h2>角色卡</h2><div id="profileText"></div><button onclick="enterGame()">进入剧情</button></section>

<section id="game" class="hidden">
<div class="card"><div id="meta"></div><div id="story" class="story"></div><div id="choices"></div></div>
<div class="card"><h2>自由行动</h2><textarea id="freeText" placeholder="输入你的行动/回复。"></textarea><button onclick="freeAction()">提交</button><button class="secondary" onclick="nextWeek()">推进下一周</button></div>
</section>

<section id="stats" class="hidden"><div class="card"><h2>属性</h2><div id="statsBox"></div></div><div class="card"><h2>剧情记录</h2><div id="log"></div></div></section>
<section id="profile" class="hidden"><div class="card"><h2>角色卡</h2><div id="profileBox"></div></div></section>
<section id="save" class="hidden"><div class="card"><h2>存档</h2><p class="small">退出前点“导出存档码”，复制到备忘录。下次粘贴回来点“导入存档码”。</p><button onclick="saveGame()">保存到浏览器</button><button class="secondary" onclick="loadGame()">读取浏览器存档</button><button class="secondary" onclick="exportSave()">导出存档码</button><textarea id="saveBox" placeholder="存档码会出现在这里。"></textarea><button class="ghost" onclick="importSave()">导入存档码</button></div></section>
</main>

<div id="bottom" class="bottom hidden"><button onclick="saveGame()">保存</button><button class="secondary" onclick="exportSave()">导出码</button><button class="ghost" onclick="nextWeek()">下周</button></div>
</div>

<script>
var boys={
shotaro:{name:"大崎将太郎（Shotaro）",role:"温柔节拍型｜舞蹈核心 / 异国温柔 / 稳定年上",pub:"舞台上动作干净利落，台下温和礼貌，是粉丝眼里治愈又稳定的舞蹈核心。",priv:"他习惯把压力消化在练习室里。真正靠近后，会用细节照顾你，也会因为你可能被粉圈攻击而克制距离。"},
eunseok:{name:"宋银硕（Eunseok）",role:"清冷反差型｜外冷内稳 / 慢热幽默 / 安静可靠",pub:"公众面前有距离感，冷静克制，偶尔露出干燥幽默。",priv:"他的关心常藏在像玩笑的话里。越喜欢越克制，因为他知道任何失控都会变成证据。"},
sungchan:{name:"郑成灿（Sungchan）",role:"直球保护型｜高大直球 / 责任感 / 保护欲强",pub:"舞台和镜头前明亮挺拔，是粉丝眼里有安全感和青春感的存在。",priv:"他比想象中更容易把情绪写在脸上。喜欢会让他下意识靠近，但越明显越容易被拍到。"},
wonbin:{name:"朴元彬（Wonbin）",role:"氛围舞台型｜舞台魅力 / 敏感内敛 / 自我要求高",pub:"舞台上的他像光线最锋利的瞬间，粉丝眼中是氛围感和舞台专注度的集合。",priv:"台下安静敏感，压力大时会封闭进耳机和练习室。他害怕你喜欢的是舞台影像，而不是真实疲惫的他。"},
sohee:{name:"李炤熙（Sohee）",role:"明亮治愈型｜清亮主唱 / 少年感 / 甜中带现实",pub:"清亮主唱，舞台上有感染力，常以明亮、可爱、治愈被记住。",priv:"他不是永远快乐，会用轻松语气转移压力。真正疲惫时，只会发一小段哼唱，像不敢说出口的安慰。"},
anton:{name:"李灿荣（Anton）",role:"安静成长型｜年下感 / 音乐创作 / 慢半拍",pub:"公众面前安静、干净、带音乐创作气质。",priv:"表达喜欢像一段没发出去的语音。会笨拙靠近，又在舆论危险时退后。"}
};
var S=null;
function el(id){return document.getElementById(id)}
function hideAll(){["cover","setup","confirm","game","stats","profile","save"].forEach(function(id){el(id).classList.add("hidden")})}
function showPage(id){hideAll();if(!S&&id==="game"){el("cover").classList.remove("hidden");return}el(id).classList.remove("hidden")}
function startCreate(){hideAll();el("setup").classList.remove("hidden");el("status").textContent="创建中"}
function currentBoy(){return boys[S.current]}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function makeProfile(){
var lead=el("lead").value,origin=el("origin").value,money=rand(900,5000),stable=rand(30,80);
if(origin.indexOf("公司")>=0||origin.indexOf("节目")>=0||origin.indexOf("造型")>=0||origin.indexOf("翻译")>=0){money=rand(1800,5600);stable=rand(45,78)}
if(origin.indexOf("咖啡店")>=0||origin.indexOf("便利店")>=0||origin.indexOf("花店")>=0){money=rand(800,2400);stable=rand(30,62)}
S={week:1,scene:"首尔麻浦区某音乐节目侧门",current:lead,player:{name:el("pName").value||"77",age:el("pAge").value||"19",origin:origin,fan:el("fan").value,pace:el("pace").value,backstory:el("backstory").value||"普通人因工作/生活轨迹误入韩娱行程半径。"},favor:rand(0,10),popularity:0,mood:70,money:money,secrecy:100,company:rand(10,40),career:rand(40,80),youth:rand(0,20),stable:stable,log:[]};
hideAll();el("confirm").classList.remove("hidden");el("status").textContent="角色卡";renderProfile()
}
function renderProfile(){if(!S)return;var b=currentBoy();var html='<div class="person"><b>玩家：'+S.player.name+'</b><span>年龄：'+S.player.age+'<br>身份：'+S.player.origin+'<br>追星程度：'+S.player.fan+'<br>剧情节奏：'+S.player.pace+'<br>前情：'+S.player.backstory+'</span></div>';html+='<div class="person"><b>'+b.name+'</b><span>'+b.role+'<br><br>【公开人设】'+b.pub+'<br><br>【私下性格】'+b.priv+'<br><br>【恋爱雷区】害怕被拍到；不喜欢粉丝滤镜替代真实了解；对公开关系极度谨慎。</span></div>';el("profileText").innerHTML=html;el("profileBox").innerHTML=html}
function enterGame(){hideAll();el("game").classList.remove("hidden");el("bottom").classList.remove("hidden");introOne()}
function stage(){var f=S.favor;if(f>=91)return"考验期";if(f>=81)return"热恋期";if(f>=66)return"确认关系";if(f>=51)return"暧昧期";if(f>=31)return"产生兴趣";if(f>=16)return"有印象";return"陌生人"}
function segment(){if(S.week<=6)return"起：误入光圈";if(S.week<=14)return"承：反复靠近";if(S.week<=24)return"转：被看见的危险";return"合：各自成长后的选择"}
function header(){return"好感度："+S.favor+" | 人气值："+S.popularity+" | 心情值："+S.mood+" | 金钱："+S.money+" | 恋情保密度："+S.secrecy+" | 公司警觉度："+S.company+" | 事业压力："+S.career+" | 青春共鸣值："+S.youth+" | 生活稳定度："+S.stable+"\n第 "+S.week+" 周 | 当前场景："+S.scene+"\n当前男主："+currentBoy().name+"\n当前关系阶段："+stage()+"\n当前叙事段落："+segment()+"\n\n"}
function setStory(text,choices){S.story=header()+text;S.choices=choices;S.log.unshift({week:S.week,scene:S.scene,text:text.slice(0,80)});render()}
function render(){el("status").textContent="第"+S.week+"周";el("meta").innerHTML='<span class="pill">第'+S.week+'周</span><span class="pill">'+S.scene+'</span><span class="pill">'+stage()+'</span><span class="pill">'+segment()+'</span>';el("story").textContent=S.story||"";el("choices").innerHTML="";S.choices.forEach(function(c,i){var btn=document.createElement("button");btn.className="choice";btn.textContent="ABCD"[i]+". "+c.text;btn.onclick=function(){choose(i)};el("choices").appendChild(btn)});var stats=[["好感度",S.favor],["人气值",S.popularity],["心情值",S.mood],["恋情保密度",S.secrecy],["公司警觉度",S.company],["事业压力",S.career],["青春共鸣值",S.youth],["生活稳定度",S.stable]];el("statsBox").innerHTML=stats.map(function(x){return'<div class="stat"><b>'+x[0]+'</b><span class="num">'+x[1]+'/100</span><div class="bar"><div class="fill" style="width:'+x[1]+'%"></div></div></div>'}).join("")+'<div class="person"><b>金钱</b><span>₩ '+S.money+'</span></div>';el("log").innerHTML=S.log.map(function(l){return'<div class="logitem"><b>第'+l.week+'周 · '+l.scene+'</b><br>'+l.text+'...</div>'}).join("");renderProfile()}
function adjust(o){["favor","popularity","mood","secrecy","company","career","youth","stable"].forEach(function(k){if(o[k])S[k]=Math.max(0,Math.min(100,S[k]+o[k]))});if(o.money)S.money=Math.max(0,S.money+o.money)}
function choose(i){var c=S.choices[i];if(c.free){freeAction();return}adjust(c.delta||{});if(c.goto==="intro2")introTwo();else if(c.goto==="intro3")introThree();else nextWeek()}
function introOne(){S.scene="首尔麻浦区某音乐节目侧门";var b=currentBoy();setStory("凌晨五点十七分，首尔的天还没亮透。\n\n你抱着一箱临时补印的通行证站在音乐节目侧门，纸箱边缘被雨水浸软，手指冻得有些发麻。前辈在电话里催你快一点，粉丝队伍从路口拐过去，低声核对着预录号码和应援口号。\n\n你原本只是来送资料。\n\n直到那辆黑色保姆车停在侧门前。\n\n车门打开的一瞬间，闪光灯从街对面亮起。你下意识后退，却被脚边的电缆绊了一下。纸箱倾斜，通行证像白色纸片一样滑出来，差点落进水洼。\n\n一只手先你一步按住了最上面的那叠纸。\n\n"+b.name+"戴着帽子和口罩，外套还带着清晨雨气。你看不清他的表情，只听见他很轻地说：\n\n“这个丢了，会很麻烦吧。”\n\n经纪人从车边看过来，眉头微微皱了一下。他立刻收回视线，像刚才的停留只是一场错觉。\n\n可当他走进侧门前，你听见他低声提醒了一句：\n\n“地上有线，小心一点。”",[{text:"立刻低头继续工作，不给自己惹麻烦。",delta:{stable:3,company:-1},goto:"intro2"},{text:"小声再说一次谢谢，试图让他听见。",delta:{favor:2,mood:3,company:1},goto:"intro2"},{text:"假装镇定，继续完成工作，但偷偷记住他的名字。",delta:{youth:2,mood:1},goto:"intro2"},{text:"自由行动：由你输入。",free:true}])}
function introTwo(){S.scene="音乐节目后台走廊";var b=currentBoy();setStory("音乐节目后台的走廊比你想象中更窄。\n\n你把通行证送到工作人员手里时，前辈只匆匆说了句“辛苦”，就转身继续对接候场顺序。墙边贴着各组艺人的待机室方向，RIIZE的名字被写在白板中间，旁边是密密麻麻的时间点：彩排、妆发、采访、预录、补录。\n\n你第一次这么近地看见韩娱机器运转的样子。每个人都在赶，每个人都不能出错。\n\n十分钟后，你在自动贩卖机旁边买热咖啡。硬币卡了一下，纸杯没有掉下来。你正要弯腰检查，身侧有人轻轻敲了敲机器侧面。\n\n纸杯落下。\n\n你抬头，看见"+b.name+"站在旁边。他没有说“又见面了”这种会显得过分熟络的话，只是看了一眼你被雨打湿的袖口。\n\n“今天一直在外面？”\n\n你点头。他像是想说什么，又被远处经纪人的声音打断。\n\n“该走了。”\n\n他把自己那杯还没开的热咖啡放到机器旁边，声音很轻：\n\n“这个拿去吧。工作人员也要保暖。”\n\n他转身离开，背影很快被走廊的人流淹没。你低头看着那杯咖啡，突然意识到——这份好意必须小心处理。",[{text:"收下咖啡，但不发任何动态。",delta:{favor:3,mood:2},goto:"intro3"},{text:"把咖啡留在原地，避免越界。",delta:{secrecy:4,mood:-1},goto:"intro3"},{text:"追上去说谢谢，但保持工作距离。",delta:{favor:4,company:2},goto:"intro3"},{text:"自由行动：自定义处理咖啡。",free:true}])}
function introThree(){S.scene="音乐节目侧门 / 第一次收工";var b=currentBoy();setStory("预录结束时，天已经亮了。\n\n粉丝队伍被工作人员引导离开，雨水停在地面缝隙里，反射出一小片灰蓝色的天空。你抱着空纸箱站在侧门旁，终于有时间喘一口气。\n\n"+b.name+"从里面出来时，脚步很快。你以为他不会再看你。\n\n可他经过你身边时，声音低到几乎被风吹散：\n\n“今天辛苦了。”\n\n不是暧昧，不是承诺，只是一句非常克制的确认。\n\n他记得你。\n\n也正因为如此，你第一次清楚感觉到：你离那个光圈很近，但还远远没有资格把它当作自己的世界。",[{text:"把这件事放在心里，继续自己的生活。",delta:{stable:4,mood:2}},{text:"回去后把今天写进日记。",delta:{youth:4,mood:3}},{text:"告诉室友，但隐去他的名字。",delta:{stable:3,secrecy:3}},{text:"自由行动：自定义收工后的选择。",free:true}])}
function freeAction(){var txt=el("freeText").value.trim();if(!txt){nextWeek();return}el("freeText").value="";adjust({favor:4,mood:2,youth:2,company:1,secrecy:-2});setStory("你选择了自己的行动：\n\n“"+txt+"”\n\n这里有工作人员，有经纪人，有粉丝，有随时可能被截出来反复放大的边角画面。\n\n"+currentBoy().name+"没有给出夸张反应，只是在短暂的停顿后，语气比刚才更柔和了一点。\n\n你能感觉到，他记住了你。\n\n但你也更清楚地知道：被记住，在这个世界里既是心动，也是风险。",[{text:"继续保持距离。",delta:{secrecy:3,stable:2}},{text:"试着建立工作上的正常联系。",delta:{favor:3,company:2}},{text:"和室友讨论这件事。",delta:{mood:3,stable:2}},{text:"自由行动：继续补充。",free:true}])}
function nextWeek(){S.week++;if(S.week>=26||S.favor>=91){ending();return}if(S.secrecy<30&&S.week<25){mediaCrisis();return}if(S.company>85&&S.week<24){companyForce();return}if(S.career>92&&S.week<24){careerCrash();return}if(S.mood<20&&S.week<24){emotionCrash();return}var map={2:workEvent,3:musicEvent,4:dailyEvent,5:memberEvent,6:privateEvent,7:companyEvent,8:growthEvent,9:fandomEvent,10:workEvent2,11:musicEvent2,12:privateEvent2,13:memberEvent2,14:companyEvent2,15:fandomEvent2,16:growthEvent2,17:finalTalkEvent,18:privateEvent3,19:companyEvent3,20:musicEvent3,21:fandomEvent3,22:careerCrash,23:growthEvent3,24:finalTalkEvent2,25:mediaCrisis};(map[S.week]||ending)()}
function dailyEvent(){S.scene="首尔夜路 / 便利店";setStory("【日常事件｜深夜便利店饭团】\n\n你结束兼职时已经接近晚上十一点。便利店的自动门反复开合，冷风把门口的塑料帘吹得轻轻响。你坐在窗边吃打折饭团，手机里是妈妈发来的消息。\n\n门口的风铃响了一下。\n\n"+currentBoy().name+"戴着口罩和帽子走进来，身边没有工作人员。他看见你时明显停了一秒。\n\n你们隔着一排货架对视。这里不是音乐节目后台，也不是品牌活动现场，只是首尔夜里一个普通便利店。正因为普通，才更危险。",[{text:"装作不认识，低头继续吃饭。",delta:{secrecy:5,mood:-1}},{text:"小声打招呼，问他是不是也没吃饭。",delta:{favor:6,secrecy:-4}},{text:"立刻结账离开，避免被拍。",delta:{stable:3,favor:-1}},{text:"自由行动：自定义便利店偶遇。",free:true}])}
function workEvent(){S.scene="回归预录后台";setStory("【韩娱工作事件｜回归预录】\n\n回归预录当天，后台灯光亮得刺眼。舞台服挂在移动衣架上，工作人员抱着对讲机来回跑，粉丝应援声隔着墙传进来。\n\n你被临时叫去协助。"+currentBoy().name+"从你身边经过时，脚步没有停，只用极轻的声音说：\n\n“今天会很乱，别站在通道口。”\n\n这是关心，但包装得像工作提醒。旁边一位前辈看了你一眼：“你们认识？”",[{text:"解释只是工作交接。",delta:{stable:2,secrecy:2}},{text:"说不熟，保持边界。",delta:{secrecy:5,favor:-1}},{text:"把话题转到流程表。",delta:{career:-2,stable:2}},{text:"自由行动。",free:true}])}
function musicEvent(){S.scene="录音室外走廊";setStory("【音乐事件｜未公开旋律】\n\n录音室外很安静，只有门缝里泄出一点旋律。\n\n你原本只是来送文件，却听见"+currentBoy().name+"反复唱同一句。那不是正式发行的歌，更像一段还没有名字的Demo。\n\n门忽然打开。他看见你，第一反应不是慌张，而是沉默。\n\n“听到了？”",[{text:"说旋律很好听，但不过问含义。",delta:{favor:6,youth:4}},{text:"问他是不是压力很大。",delta:{favor:5,career:-4}},{text:"开玩笑说自己不会泄露。",delta:{favor:4,mood:3}},{text:"自由行动。",free:true}])}
function memberEvent(){S.scene="待机室外 / 成员察觉";setStory("【成员察觉事件｜一句玩笑后的安静】\n\n待机室门没有完全关上。里面有人在笑。\n\n你抱着资料路过时，听见有人开玩笑问他：“你最近是不是总看手机？”\n\n里面忽然安静了一秒。\n\n"+currentBoy().name+"的声音很低：“没有，确认行程而已。”\n\n你站在门外，没有继续听。你知道，这种被旁人察觉的瞬间，比真正被拍到之前更让人紧张。",[{text:"立刻离开。",delta:{secrecy:6,stable:2}},{text:"之后提醒他不要频繁看手机。",delta:{favor:3,company:2}},{text:"假装没听见，但心里不安。",delta:{mood:-4,secrecy:2}},{text:"自由行动。",free:true}])}
function privateEvent(){S.scene="海外行程酒店走廊";setStory("【高张力事件｜酒店走廊的停顿】\n\n海外行程结束后，酒店走廊安静得只剩下空调声。你原本只是去还文件，却在电梯口遇见"+currentBoy().name+"。\n\n他妆发已经卸掉，帽檐压得低。你们站得不远，却谁都没有先开口。\n\n电梯门打开又合上。\n\n他低声说：“今天别再一个人回去了。”",[{text:"点头，接受安排但保持距离。",delta:{favor:7,secrecy:3}},{text:"问他是不是在担心你。",delta:{favor:8,mood:3,secrecy:-2}},{text:"提醒他走廊可能有监控。",delta:{secrecy:6,company:-2}},{text:"自由行动。",free:true}])}
function companyEvent(){S.scene="公司附近咖啡厅";adjust({company:12,mood:-5,secrecy:-5});setStory("【公司干预事件｜经纪人约谈】\n\n韩室长坐在你对面，把几张模糊截图推到桌面上：侧门、便利店、后台走廊。\n\n“我不是要拆散你们。”他说，“我只是要确认，你知道一张照片能让多少人的努力被重新审判吗？”\n\n你没有立刻回答。这句话太现实了，现实到连委屈都显得不合时宜。",[{text:"承认风险，减少私下接触。",delta:{company:-6,secrecy:8,favor:-2}},{text:"强调没有越界。",delta:{stable:2,company:2}},{text:"问真心是否只能被否定。",delta:{favor:4,company:8,mood:-3}},{text:"自由行动。",free:true}])}
function growthEvent(){S.scene="出租屋 / 深夜书桌";setStory("【成长事件｜自己的生活】\n\n晚上，合租屋停电。你点着手机手电筒整理账单，学费、房租、交通费、吃饭、签证材料，一项项压在纸上。\n\n你忽然意识到，自己不能只围着他的世界旋转。\n\n他有舞台、公司、粉丝和组合。你也必须有学业、工作、朋友和未来。\n\n手机屏幕亮起，是"+currentBoy().name+"发来的消息：\n\n“今天还好吗？”",[{text:"诚实回复：不太好，但我会处理。",delta:{favor:5,stable:4,mood:3}},{text:"只回复：还好，你练习顺利吗？",delta:{secrecy:2,favor:2}},{text:"先不回，专心处理现实问题。",delta:{stable:8,mood:2,favor:-2}},{text:"自由行动。",free:true}])}
function fandomEvent(){S.scene="X / 韩网论坛";adjust({secrecy:-18,popularity:8,mood:-6,company:5});setStory("【粉圈舆论事件｜同款被扒】\n\nMina把一张截图发给你。\n\n韩网论坛有人发帖：有人注意到"+currentBoy().name+"最近用的便利店纸袋，和某工作人员小号照片里的是同一家吗？\n\n评论区还没有爆，但已经有人开始搬运。粉圈速度比你想象中更快。",[{text:"清理社交账号。",delta:{secrecy:8,mood:-2}},{text:"联系Mina观察舆论。",delta:{stable:2,popularity:3}},{text:"告诉男主这件事。",delta:{favor:4,company:4}},{text:"自由行动。",free:true}])}
function finalTalkEvent(){S.scene="汉江边 / 深夜短暂散步";setStory("【沉淀事件｜汉江边短暂散步】\n\n晚上风很冷。你们没有并肩太近，只是隔着一点安全距离走在汉江边。\n\n他戴着帽子，手插在外套口袋里。路灯把他的影子拉得很长。\n\n“我有时候觉得，”他慢慢开口，“对你来说，我好像总是一个麻烦。”\n\n你没有马上回答。\n\n因为你知道，他不是在自责，也不是在求安慰。他只是在说一个你们都无法绕开的事实：喜欢是真的，现实也是真的。",[{text:"说他不是麻烦，但你也不能失去自己。",delta:{favor:8,youth:8,stable:4}},{text:"问他有没有想过承担这段关系。",delta:{favor:6,company:5,mood:-2}},{text:"说先不要急着给答案。",delta:{secrecy:4,mood:3}},{text:"自由行动。",free:true}])}
function workEvent2(){S.scene="品牌活动侧门";setStory("【品牌活动｜闪光灯边角】\n\n品牌活动结束后，人群还没有散。你站在侧门核对物料，听见快门声密集地响。\n\n"+currentBoy().name+"从红毯方向退下来，目光短暂扫过你，又很快移开。\n\n他没有停留，只在经过时把一张掉落的工作证轻轻推回你手边。动作很小，小到不会被镜头捕捉，却足够让你心跳乱了一拍。",[{text:"当作普通工作失误处理。",delta:{secrecy:5,stable:2}},{text:"小声说谢谢。",delta:{favor:5,mood:2}},{text:"回避他的视线。",delta:{secrecy:3,mood:-1}},{text:"自由行动。",free:true}])}
function musicEvent2(){S.scene="练习室镜墙前";setStory("【练习室｜汗水和沉默】\n\n深夜练习室的灯还亮着。镜墙映出"+currentBoy().name+"反复练习的身影。\n\n你站在门口，没有进去。他却从镜子里看见了你。\n\n“等很久了吗？”\n\n他声音有点哑，额发被汗水压低。你突然意识到，喜欢一个站在舞台上的人，也意味着会看见舞台背后无数次不被拍到的疲惫。",[{text:"递水给他。",delta:{favor:6,career:-3}},{text:"说自己只是路过。",delta:{secrecy:3}},{text:"问他今天是不是练太久了。",delta:{favor:5,mood:2}},{text:"自由行动。",free:true}])}
function privateEvent2(){S.scene="雨夜公交站";setStory("【雨夜公交站】\n\n雨下得很急。你错过末班车，站在公交站牌下看手机电量一点点变低。\n\n一辆黑色车停在不远处。车窗降下一点，你看见"+currentBoy().name+"的眼睛。\n\n他没有叫你的名字，只说：“上车吧，这里不安全。”\n\n你知道这句话背后有风险，也知道他已经在努力把关心说得像一件普通小事。",[{text:"上车，但坐到后排。",delta:{favor:7,secrecy:-3}},{text:"拒绝，说自己可以打车。",delta:{secrecy:5,favor:-1}},{text:"问经纪人知不知道。",delta:{company:-2,secrecy:4}},{text:"自由行动。",free:true}])}
function memberEvent2(){S.scene="待机室门口";setStory("【成员提醒】\n\n有成员从待机室出来，看见你时礼貌点头。\n\n他没有多问，只是经过"+currentBoy().name+"身边时，轻轻拍了一下他的肩：“回归期，别太明显。”\n\n那句话没有恶意，却像一盆冷水，把刚刚升温的空气压回现实。",[{text:"主动退后一步。",delta:{secrecy:6,mood:-1}},{text:"等他自己处理。",delta:{favor:3}},{text:"心里开始动摇。",delta:{mood:-5,stable:2}},{text:"自由行动。",free:true}])}
function companyEvent2(){S.scene="公司电梯间";setStory("【公司电梯间】\n\n电梯门关上前，你和韩室长同时站进去。\n\n他看了眼楼层数字，突然说：“我知道你不是故意制造麻烦。但在这个行业里，不故意不代表没有后果。”\n\n电梯缓慢上升，你攥着文件袋，第一次真切感受到自己站在规则里面，而不是故事里面。",[{text:"说自己会注意边界。",delta:{company:-5,secrecy:5}},{text:"问他是否完全不相信你们。",delta:{company:5,mood:-2}},{text:"沉默。",delta:{mood:-1,stable:2}},{text:"自由行动。",free:true}])}
function fandomEvent2(){S.scene="粉圈群聊";setStory("【粉圈群聊｜熟悉的语气】\n\n你的追星搭子把群聊截图发来。有人正在分析他最近直播里的语气变化。\n\n“他是不是有喜欢的人了？”\n\n这句话下面跟着一串玩笑和猜测。你看着屏幕，忽然有种很奇怪的割裂感：她们喜欢的是他的光，而你见过他疲惫时低头喝水的样子。",[{text:"退出群聊一会儿。",delta:{mood:5,secrecy:3}},{text:"装作普通粉丝继续聊天。",delta:{popularity:2,mood:-2}},{text:"提醒朋友不要过度猜测。",delta:{stable:3}},{text:"自由行动。",free:true}])}
function growthEvent2(){S.scene="学校 / 公司附近自习室";setStory("【自我生活｜重新排班】\n\n你把兼职、学业和休息时间重新列了一张表。那些原本被临时行程挤压掉的生活，一点点回到纸面上。\n\n你突然发现，稳定不是不爱，而是有能力不被爱拖垮。\n\n手机里，他发来一张练习室地板的照片，没有文字。你看了很久，回了一句：“今天也辛苦了。”",[{text:"继续专注自己的计划。",delta:{stable:8,youth:5}},{text:"问他什么时候休息。",delta:{favor:4,mood:2}},{text:"没有立刻回。",delta:{stable:5,favor:-1}},{text:"自由行动。",free:true}])}
function privateEvent3(){S.scene="清晨无人停车场";setStory("【清晨无人停车场】\n\n天还没亮，停车场空荡荡的。他坐在车里，窗户降下一点，像是只想确认你平安到达。\n\n“我只看一眼就走。”他说。\n\n你站在几步之外，忽然有点心酸。你们明明在同一座城市，却连关心都要装作偶然。",[{text:"说你平安到了，让他走。",delta:{secrecy:5,favor:3}},{text:"问他累不累。",delta:{favor:6,career:-2}},{text:"说这样太难了。",delta:{mood:-3,youth:4}},{text:"自由行动。",free:true}])}
function companyEvent3(){S.scene="经纪人电话";setStory("【电话警告】\n\n韩室长没有见你，只打来一通电话。\n\n“最近有站姐在跟非公开通道。”\n\n他顿了顿，语气放缓：“你不是坏人。但你们都要知道，越喜欢，越要克制。”\n\n电话挂断后，你坐在床边很久。",[{text:"主动减少见面。",delta:{secrecy:8,company:-6,favor:-3}},{text:"告诉男主站姐的事。",delta:{favor:4,company:3}},{text:"先和室友商量。",delta:{stable:5,mood:3}},{text:"自由行动。",free:true}])}
function musicEvent3(){S.scene="未公开Demo文件";setStory("【未公开Demo】\n\n他误把一个Demo链接发给你，又很快撤回。\n\n你只听到了前几秒：很轻的呼吸声，像雨后的街道，像一句没敢说出口的“想你”。\n\n几分钟后，他发来消息：\n\n“刚才那个，忘掉吧。”\n\n可你知道，有些东西一旦听见，就不可能真的忘掉。",[{text:"说你没有点开。",delta:{secrecy:4,favor:2}},{text:"说很好听。",delta:{favor:8,youth:5}},{text:"问是不是写给谁的。",delta:{favor:4,mood:-1}},{text:"自由行动。",free:true}])}
function fandomEvent3(){S.scene="倒计时爆料";setStory("【倒计时爆料】\n\n一个搬运号突然发出预告：今晚会有某成员私下关系相关内容。\n\n没有姓名，没有证据，只有模糊到不能再模糊的文字。\n\n可你还是立刻想到了自己。\n\n你第一次明白，关系一旦进入粉圈视野，真相反而不重要。重要的是大家愿意相信什么。",[{text:"先保护自己的账号。",delta:{secrecy:8,stable:4}},{text:"联系他。",delta:{favor:5,company:4}},{text:"什么都不做，等待结果。",delta:{mood:-5}},{text:"自由行动。",free:true}])}
function growthEvent3(){S.scene="个人面试 / 作品提交";setStory("【各自发光】\n\n你提交了自己的作品/申请/面试材料。那一刻你突然意识到：你的人生不是他的支线。\n\n晚上，他问你结果怎么样。\n\n你说还不知道，但你第一次不是等他拯救你，而是在认真走自己的路。\n\n他沉默了一会儿，回你：\n\n“我很为你骄傲。”",[{text:"认真接受这句鼓励。",delta:{favor:6,youth:10,stable:6}},{text:"开玩笑说别太感动。",delta:{favor:4,mood:4}},{text:"说你也想成为能支持他的人。",delta:{favor:8,youth:6}},{text:"自由行动。",free:true}])}
function finalTalkEvent2(){S.scene="最终选择前夜";setStory("【最终选择前夜】\n\n你们没有见面，只是开着语音。两边都很安静。\n\n他问：“如果之后还是不能公开，你会后悔吗？”\n\n你握着手机，听见自己的呼吸。\n\n这不是一道简单的恋爱题。它关于你能不能承受隐秘，能不能继续拥有自己，也关于他有没有能力在现实里保护这段感情，而不是只在深夜说想你。",[{text:"说只要彼此稳定，你可以等待。",delta:{favor:8,secrecy:5,stable:4}},{text:"说你需要更明确的未来。",delta:{favor:5,company:5,youth:4}},{text:"说先各自成长。",delta:{youth:10,stable:8}},{text:"自由行动。",free:true}])}
function mediaCrisis(){S.scene="韩网匿名爆料 / 公司紧急会议";setStory("【媒体曝光危机】\n\n恋情保密度已经跌到危险线以下。\n\n韩网匿名号发出倒计时预告：“今晚公开某男团成员与工作人员/素人关系证据。”\n\n公司紧急开会，Mina让你立刻下线，室友让你回家，不要再出现在公司附近。\n\n"+currentBoy().name+"只发来一句话：\n\n“别怕。先保护你自己。”\n\n可你知道，选择已经到了眼前。",[{text:"否认关系，保住他的事业。",delta:{secrecy:15,company:-8,favor:-6}},{text:"暂时分开，让舆论降温。",delta:{company:-10,mood:-8,stable:5}},{text:"私下坚持，但切断公开交集。",delta:{favor:8,secrecy:10,mood:-4}},{text:"自由行动。",free:true}])}
function companyForce(){S.scene="公司会议室";setStory("【强制干预事件】\n\n公司警觉度超过红线。\n\n韩室长正式要求你交代所有接触记录，并通知你：之后不再安排你接触RIIZE相关行程。\n\n这不是电视剧里的反派场景。没有人拍桌子，也没有人羞辱你。正因为所有人都很冷静，才更让人喘不过气。",[{text:"接受调离，保住工作。",delta:{stable:8,company:-10,favor:-4}},{text:"申请书面说明，保护自己。",delta:{stable:5,company:-4}},{text:"联系男主，让他不要冲动。",delta:{favor:5,company:5}},{text:"自由行动。",free:true}])}
function careerCrash(){S.scene="练习室外";setStory("【男主事业压力崩溃事件】\n\n事业压力已经过高。\n\n练习室的灯亮到凌晨。"+currentBoy().name+"坐在地板边，背靠镜墙，帽檐压得很低。\n\n可他抬头看见你，没有像平时那样立刻整理表情。\n\n“我今天好像……做不好。”他说。\n\n这是他第一次在你面前承认脆弱。",[{text:"安静坐在旁边，不急着安慰。",delta:{favor:8,youth:6,career:-5}},{text:"提醒他先喝水休息。",delta:{favor:5,career:-4}},{text:"说你不是来评价舞台的。",delta:{favor:8,mood:3}},{text:"自由行动。",free:true}])}
function emotionCrash(){S.scene="地铁末班车";setStory("【情绪崩溃事件】\n\n心情值跌得太低。末班地铁里，玻璃窗映出你疲惫的脸。\n\n你突然怀疑，自己是不是只是在他人生里制造风险。不是不喜欢，不是不心动，而是这段关系太重了。\n\n手机里，他的聊天框停在上一句未读。",[{text:"告诉他你撑不住了。",delta:{favor:5,mood:5,secrecy:-3}},{text:"先联系室友。",delta:{mood:10,stable:6}},{text:"关机回家睡觉。",delta:{mood:8,favor:-2}},{text:"自由行动。",free:true}])}
function ending(){S.scene="结局分歧";var result="OE：未公开的等待";if(S.favor>=90&&S.secrecy>=60&&S.company<=70&&S.career<=90&&S.youth>=60&&S.stable>=50){result="HE：隐秘而稳定的爱"}else if(S.secrecy<20&&S.company>85){result="BE：曝光后的分离"}else if(S.mood<25){result="BE：你选择离开"}else if(S.youth>=80){result="GE：各自发光"}else if(S.favor>=95&&S.popularity>=50&&S.company<=70){result="SE：公开恋爱"}setStory("【"+result+"】\n\n这一路并没有变成轻松的童话。\n\n你见过他的舞台，也见过后台走廊里来不及说出口的疲惫；你知道粉丝的爱可以托起一个人，也可能把一段关系压到无法呼吸；你也终于明白，恋爱不是唯一目标，你必须先拥有自己的生活，才有资格站在任何人的光圈旁边。\n\n结局不是全网祝福，也不是公司秒同意。它只是你们在现实缝隙里做出的选择。",[{text:"导出存档码。",delta:{}},{text:"查看角色卡。",delta:{}},{text:"补写最终独白。",delta:{mood:3}},{text:"自由行动。",free:true}])}
function saveGame(){if(!S){alert("请先开始游戏");return}localStorage.setItem("riize_sister_final_fixed",JSON.stringify(S));el("status").textContent="已保存"}
function loadGame(){var s=localStorage.getItem("riize_sister_final_fixed");if(!s){alert("没有浏览器存档");return}S=JSON.parse(s);hideAll();el("game").classList.remove("hidden");el("bottom").classList.remove("hidden");render()}
function exportSave(){if(!S){alert("请先开始游戏");return}var code=btoa(unescape(encodeURIComponent(JSON.stringify(S))));el("saveBox").value=code;el("saveBox").focus();el("saveBox").select();alert("存档码已生成，请复制到备忘录。")}
function importSave(){var code=el("saveBox").value.trim();if(!code){alert("请先粘贴存档码");return}try{S=JSON.parse(decodeURIComponent(escape(atob(code))));localStorage.setItem("riize_sister_final_fixed",JSON.stringify(S));hideAll();el("game").classList.remove("hidden");el("bottom").classList.remove("hidden");render()}catch(e){alert("存档码无效或复制不完整")}}
</script>
