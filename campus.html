<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RIIZE 校园恋爱模拟器</title>
<style>
body{margin:0;background:linear-gradient(180deg,#ffe8ef,#fff8ef 50%,#eef7ff);color:#2b2522;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:#fffaf7}
.top{position:sticky;top:0;z-index:5;background:rgba(255,250,247,.95);backdrop-filter:blur(12px);border-bottom:1px solid #eaded6;padding:12px}
h1{font-size:17px;margin:0}.badge{float:right;font-size:11px;border:1px solid #eaded6;border-radius:99px;padding:4px 8px;color:#7b6860}
.tabs{display:flex;gap:6px;margin-top:10px;overflow:auto}.tabs button{white-space:nowrap;font-size:12px;padding:8px 10px;margin:0}
main{padding:14px 12px 86px}.card{background:#fff;border:1px solid #eaded6;border-radius:22px;padding:15px;margin:12px 0;box-shadow:0 16px 40px rgba(52,32,20,.12)}
.cover{height:190px;border-radius:20px;background:radial-gradient(circle at 25% 30%,#ff8aa899,transparent 25%),radial-gradient(circle at 75% 38%,#8fc7ff77,transparent 28%),linear-gradient(135deg,#ffe0ea,#eaf5ff);display:flex;align-items:end;padding:16px;margin-bottom:12px}
.cover b{font-size:20px;line-height:1.25}
.small{font-size:12px;color:#887a72;line-height:1.6}
.notice{font-size:12px;line-height:1.6;background:#fff4df;border:1px solid #edd5a7;border-radius:16px;padding:10px;color:#73552b}
label{display:block;font-size:12px;color:#887a72;margin:10px 0 5px}
input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #eaded6;background:#fff;color:#2b2522;border-radius:15px;padding:11px;font-size:15px}
textarea{min-height:82px}
button{width:100%;border:0;border-radius:16px;background:linear-gradient(135deg,#ff8aa4,#ffc06d);color:#321;padding:12px;font-weight:800;font-size:15px;margin-top:9px}
.secondary{background:#fff;color:#6e554b;border:1px solid #eaded6}.ghost{background:transparent;color:#795b50;border:1px dashed #d6bdb2}
.hidden{display:none}.story{white-space:pre-wrap;line-height:1.82;font-size:15.5px}
.choice{background:#fff;color:#302724;border:1px solid #eaded6;text-align:left;line-height:1.55}
.pill{display:inline-block;font-size:11px;border:1px solid #eaded6;border-radius:99px;padding:5px 8px;margin:0 5px 8px 0;color:#765e54}
.stat{margin:10px 0}.stat b{font-size:13px}.num{float:right;color:#887a72;font-size:12px}
.bar{height:8px;background:#f1e3dc;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;background:linear-gradient(90deg,#ff8aa4,#ffc06d)}
.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;max-width:430px;width:100%;background:rgba(255,250,247,.95);border-top:1px solid #eaded6;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px;box-sizing:border-box}
.bottom button{font-size:13px;padding:10px;margin:0}
.person{background:#fff;border:1px solid #eaded6;border-radius:16px;padding:10px;margin:8px 0}
.person span{display:block;color:#887a72;font-size:12px;line-height:1.5;margin-top:5px}
.logitem{border-bottom:1px solid #eaded6;padding:10px 0}
</style>
</head>

<body>
<div class="app">
<div class="top">
<h1>RIIZE 校园恋爱模拟器 <span id="status" class="badge">可玩版</span></h1>
<div class="tabs">
<button onclick="showPage('game')">剧情</button>
<button onclick="showPage('stats')">好感</button>
<button onclick="showPage('profile')">角色</button>
<button onclick="showPage('save')">存档</button>
</div>
</div>

<main>
<section id="cover" class="card">
<div class="cover"><b>转校第一天、社团招新、雨天林荫道<br>和少年少女的青春悸动</b></div>
<h2>RIIZE 校园恋爱模拟器</h2>
<p class="small">平行世界虚构校园文游。剧情、校园关系、恋爱线、人物心理均为虚构创作，不代表现实艺人经历、私生活或真实性格。</p>
<div class="notice">青涩、治愈、双向成长。主打校园日常、社团、文化节、运动会、放学路和细腻心动。</div>
<button onclick="startCreate()">开始游戏</button>
</section>

<section id="setup" class="card hidden">
<h2>角色创建</h2>

<label>学校名称</label>
<input id="school" value="圣水艺术高中">

<label>姓名</label>
<input id="pName" value="77">

<label>转学原因</label>
<input id="reason" placeholder="例如：父母工作调动 / 追梦 / 家庭原因">

<label>性格</label>
<select id="personality">
<option>温柔内敛</option>
<option>活泼开朗</option>
<option>冷静理智</option>
<option>自定义</option>
</select>

<label>特长</label>
<input id="talent" placeholder="绘画 / 文字 / 乐器 / 运动 / 摄影">

<label>学习成绩</label>
<select id="study">
<option>中上，努力型</option>
<option>年级前列，学霸型</option>
<option>普通，偏科明显</option>
<option>刚转学，暂时不稳定</option>
</select>

<label>家庭背景</label>
<select id="family">
<option>普通家庭</option>
<option>小康家庭</option>
<option>艺术家庭</option>
<option>寄宿/单亲设定</option>
<option>自定义</option>
</select>

<label>初始关注男主</label>
<select id="lead">
<option value="shotaro">Shotaro（大﨑将太郎）</option>
<option value="eunseok">Eunseok（宋银硕）</option>
<option value="sungchan">Sungchan（郑成灿）</option>
<option value="wonbin">Wonbin（朴元彬）</option>
<option value="sohee">Sohee（李炤熙）</option>
<option value="anton">Anton（李灿荣）</option>
</select>

<label>补充设定</label>
<textarea id="extra" placeholder="比如外貌、习惯、性格缺陷、想走甜线/慢热线等。"></textarea>

<button onclick="makeProfile()">确定</button>
</section>

<section id="confirm" class="card hidden">
<h2>角色卡</h2>
<div id="profileText"></div>
<button onclick="enterGame()">进入剧情</button>
</section>

<section id="game" class="hidden">
<div class="card">
<div id="meta"></div>
<div id="story" class="story"></div>
<div id="choices"></div>
</div>

<div class="card">
<h2>自由行动</h2>
<textarea id="freeText" placeholder="输入你想说的话、想做的事、想去的场景。"></textarea>
<button onclick="freeAction()">提交</button>
<button class="secondary" onclick="nextDay()">推进下一天</button>
</div>
</section>

<section id="stats" class="hidden">
<div class="card">
<h2>校园状态</h2>
<div id="statsBox"></div>
</div>
<div class="card">
<h2>剧情记录</h2>
<div id="log"></div>
</div>
</section>

<section id="profile" class="hidden">
<div class="card">
<h2>角色卡</h2>
<div id="profileBox"></div>
</div>
</section>

<section id="save" class="hidden">
<div class="card">
<h2>存档</h2>
<p class="small">退出来前点“导出存档码”，复制到备忘录。下次粘贴回来点“导入存档码”。</p>
<button onclick="saveGame()">保存到浏览器</button>
<button class="secondary" onclick="loadGame()">读取浏览器存档</button>
<button class="secondary" onclick="exportSave()">导出存档码</button>
<textarea id="saveBox" placeholder="存档码会出现在这里。"></textarea>
<button class="ghost" onclick="importSave()">导入存档码</button>
</div>
</section>
</main>

<div id="bottom" class="bottom hidden">
<button onclick="saveGame()">保存</button>
<button class="secondary" onclick="exportSave()">导出码</button>
<button class="ghost" onclick="nextDay()">明天</button>
</div>
</div>

<script>
var boys = {
shotaro:{
name:"Shotaro（大﨑将太郎）",
cls:"高二（1）班",
role:"舞蹈社团主力成员、日韩语双语小能手",
tag:"阳光治愈、元气舞者、温柔暖男",
desc:"来自日本神奈川，礼貌友善，笑容极具感染力。舞台上气场全开，私下喜欢甜食，心思细腻，会默默照顾别人。"
},
eunseok:{
name:"Eunseok（宋银硕）",
cls:"高二（3）班",
role:"班长、声乐社团成员",
tag:"毒舌温柔、责任担当",
desc:"作为班长认真严谨，外冷内热。表面吐槽你的小马虎，实际会替你整理资料、补习功课，关键时刻站出来。"
},
sungchan:{
name:"Sungchan（郑成灿）",
cls:"高二（1）班",
role:"学生会副会长、足球社团主力",
tag:"清冷学长、温柔隐忍、外冷内热",
desc:"身形挺拔，话不多，看似难接近。其实喜欢小动物，擅长用行动表达关心，会默默守护在意的人。"
},
wonbin:{
name:"Wonbin（朴元彬）",
cls:"高二（3）班",
role:"吉他社团社长、视觉担当",
tag:"清冷校草、细腻敏感、温柔艺术家",
desc:"安静内敛，喜欢摄影和吉他，擅长捕捉细微情绪。看似高冷，实则不擅长拒绝你温柔的请求。"
},
sohee:{
name:"Sohee（李炤熙）",
cls:"高二（2）班",
role:"声乐社团主唱、吉他手",
tag:"温柔学长、治愈主唱、腼腆少年",
desc:"气质干净温柔，歌声清澈。私下腼腆，容易脸红，但舞台上唱歌时气场十足。"
},
anton:{
name:"Anton（李灿荣）",
cls:"高二（4）班",
role:"器乐社团成员、游泳社团主力",
tag:"天才少年、温柔内敛",
desc:"气质清冷，擅长钢琴和大提琴，也会游泳。慢热但细腻，会记住你的喜好。"
}
};

var S = null;

function el(id){ return document.getElementById(id); }

function hideAll(){
["cover","setup","confirm","game","stats","profile","save"].forEach(function(id){
el(id).classList.add("hidden");
});
}

function showPage(id){
hideAll();
if(!S && id === "game"){
el("cover").classList.remove("hidden");
return;
}
el(id).classList.remove("hidden");
}

function startCreate(){
hideAll();
el("setup").classList.remove("hidden");
el("status").textContent = "创建中";
}

function currentBoy(){
return boys[S.current];
}

function rand(a,b){
return Math.floor(Math.random() * (b-a+1)) + a;
}

function makeProfile(){
var lead = el("lead").value;

S = {
day:1,
scene:"高二（3）班教室",
current:lead,
player:{
school:el("school").value || "圣水艺术高中",
name:el("pName").value || "77",
reason:el("reason").value || "家庭原因转学到首尔",
personality:el("personality").value,
talent:el("talent").value || "文字",
study:el("study").value,
family:el("family").value,
extra:el("extra").value || "暂无补充"
},
love:{
shotaro:0,
eunseok:0,
sungchan:0,
wonbin:0,
sohee:0,
anton:0
},
mood:72,
grades:70,
reputation:50,
energy:80,
friendship:35,
bag:[],
log:[]
};

S.love[lead] = 8;

hideAll();
el("confirm").classList.remove("hidden");
el("status").textContent = "角色卡";
renderProfile();
}

function loveStage(v){
if(v >= 81) return "热恋";
if(v >= 61) return "心动";
if(v >= 41) return "好感";
if(v >= 21) return "熟悉";
return "陌生";
}

function renderProfile(){
if(!S) return;

var b = currentBoy();
var html = "";

html += '<div class="person"><b>玩家：' + S.player.name + '</b>';
html += '<span>学校：' + S.player.school + '<br>';
html += '年级：高二（3）班<br>';
html += '转学原因：' + S.player.reason + '<br>';
html += '性格：' + S.player.personality + '<br>';
html += '特长：' + S.player.talent + '<br>';
html += '学习成绩：' + S.player.study + '<br>';
html += '家庭背景：' + S.player.family + '<br>';
html += '补充：' + S.player.extra + '</span></div>';

html += '<div class="person"><b>' + b.name + '</b>';
html += '<span>' + b.cls + '<br>' + b.role + '<br>' + b.tag + '<br><br>' + b.desc + '</span></div>';

el("profileText").innerHTML = html;
el("profileBox").innerHTML = html;
}

function enterGame(){
hideAll();
el("game").classList.remove("hidden");
el("bottom").classList.remove("hidden");
firstDay();
}

function header(){
return "学习状态：" + S.grades +
" | 校园名声：" + S.reputation +
" | 心情值：" + S.mood +
" | 体力：" + S.energy +
" | 朋友融入度：" + S.friendship +
"\n第 " + S.day + " 天 | 当前场景：" + S.scene +
"\n当前聚焦男主：" + currentBoy().name +
"\n关系阶段：" + loveStage(S.love[S.current]) +
"\n当前好感度：" + S.love[S.current] + "/100\n\n";
}

function setStory(text, choices){
S.story = header() + text;
S.choices = choices;
S.log.unshift({
day:S.day,
scene:S.scene,
text:text.slice(0,70)
});
render();
}

function render(){
el("status").textContent = "第" + S.day + "天";

el("meta").innerHTML =
'<span class="pill">第' + S.day + '天</span>' +
'<span class="pill">' + S.scene + '</span>' +
'<span class="pill">' + currentBoy().name + '</span>' +
'<span class="pill">' + loveStage(S.love[S.current]) + '</span>';

el("story").textContent = S.story || "";

el("choices").innerHTML = "";
S.choices.forEach(function(c,i){
var btn = document.createElement("button");
btn.className = "choice";
btn.textContent = "ABCDE"[i] + ". " + c.text;
btn.onclick = function(){ choose(i); };
el("choices").appendChild(btn);
});

var stats = [
["学习状态",S.grades],
["校园名声",S.reputation],
["心情值",S.mood],
["体力",S.energy],
["朋友融入度",S.friendship],
["Shotaro",S.love.shotaro],
["Eunseok",S.love.eunseok],
["Sungchan",S.love.sungchan],
["Wonbin",S.love.wonbin],
["Sohee",S.love.sohee],
["Anton",S.love.anton]
];

el("statsBox").innerHTML = stats.map(function(x){
var n = x[0], v = x[1];
return '<div class="stat"><b>' + n + '</b><span class="num">' + v + '/100</span><div class="bar"><div class="fill" style="width:' + v + '%"></div></div></div>';
}).join("");

el("log").innerHTML = S.log.map(function(l){
return '<div class="logitem"><b>第' + l.day + '天 · ' + l.scene + '</b><br>' + l.text + '...</div>';
}).join("");

renderProfile();
}

function adjust(o){
if(o.love){
S.love[S.current] = Math.max(0, Math.min(100, S.love[S.current] + o.love));
}
if(o.mood) S.mood = Math.max(0, Math.min(100, S.mood + o.mood));
if(o.grades) S.grades = Math.max(0, Math.min(100, S.grades + o.grades));
if(o.rep) S.reputation = Math.max(0, Math.min(100, S.reputation + o.rep));
if(o.energy) S.energy = Math.max(0, Math.min(100, S.energy + o.energy));
if(o.friend) S.friendship = Math.max(0, Math.min(100, S.friendship + o.friend));
if(o.item) S.bag.push(o.item);
}

function firstDay(){
var b = currentBoy();

setStory(
"【主线剧情：转校第一天】\n\n" +
"你转入" + S.player.school + "的第一天，首尔的清晨还带着一点湿冷。校门口的银杏树叶被风吹得轻轻晃动，远处礼堂传来声乐社团练声的声音，和操场上足球社的哨声混在一起，像一张慢慢铺开的校园地图。\n\n" +
"你因为“" + S.player.reason + "”来到这里。班主任把你带到高二（3）班门口，轻轻敲了敲门。教室里原本有些吵闹，门打开的瞬间，几十道目光同时落在你身上。\n\n" +
"“这是新转来的同学，大家以后多照顾。”\n\n" +
"你站在讲台旁，做完自我介绍。你的性格标签是“" + S.player.personality + "”，特长是“" + S.player.talent + "”。这些信息看似普通，却会悄悄影响你之后在校园里的交友和剧情触发。\n\n" +
"班主任指了指靠窗的空位。你抱着书包走过去时，前排的Eunseok（宋银硕）作为班长回头看了你一眼，语气淡淡地提醒：“课表贴在黑板左侧，别第一天就走错教室。”\n\n" +
"听起来像吐槽，但他已经把多余的一份校内地图放到了你的桌角。\n\n" +
"而你心里最在意的初始关注对象，是" + b.name + "。\n\n" +
"上午的课很快结束。午休铃声响起，你终于获得了第一个自由行动时间。",
[
{text:"去问Eunseok（宋银硕）课表和校内流程。", delta:{love:3, friend:6, grades:2}, target:"eunseok"},
{text:"去寻找" + b.name + "，制造第一次自然交集。", delta:{love:8, mood:3, rep:2}},
{text:"一个人去校园林荫道熟悉环境。", delta:{mood:7, energy:4}, scene:"walk"},
{text:"去社团招新栏看看有哪些活动。", delta:{rep:5, friend:4, energy:-3}, scene:"club"},
{text:"自由行动：自定义你的转校第一天午休。", free:true}
]
);
}

function choose(i){
var c = S.choices[i];

if(c.free){
freeAction();
return;
}

if(c.target){
S.current = c.target;
}

adjust(c.delta || {});

if(c.scene === "walk"){
walkScene();
}else if(c.scene === "club"){
clubScene();
}else if(c.target === "eunseok"){
classLeaderScene();
}else{
leadScene();
}
}

function classLeaderScene(){
S.scene = "高二（3）班教室";

setStory(
"【课间互动：班长的毒舌照顾】\n\n" +
"你走到Eunseok（宋银硕）的座位旁，问他下午课程和教室位置。\n\n" +
"他抬头看你，表情很平静：“终于想起自己是转学生了？”\n\n" +
"你还没来得及反驳，他已经把一本整理好的校内手册推到你面前，里面用便签标出了高二（3）班常用教室、图书馆、医务室、礼堂和各个社团活动室的位置。\n\n" +
"“别误会，”他把笔帽扣上，“班长的工作而已。你要是迟到，老师会先找我。”\n\n" +
"话是这么说，可他连你第一周要补交的材料都提前列好了清单。",
[
{text:"认真道谢，并说自己会尽快适应。", delta:{love:5, friend:4}},
{text:"故意回嘴：“班长你其实人很好吧？”", delta:{love:7, mood:3}},
{text:"请他放学后帮你补一下数学。", delta:{love:6, grades:6}},
{text:"注意到他乱糟糟的抽屉，忍不住笑了一下。", delta:{love:5, mood:3}},
{text:"自由行动：自定义和班长的对话。", free:true}
]
);
}

function leadScene(){
var b = currentBoy();
S.scene = sceneFor(S.current);

setStory(
"【专属初遇：" + b.name + "】\n\n" +
"你按照午休时听到的线索，走向" + S.scene + "。\n\n" +
b.name + "并没有像传闻里那样遥不可及。他只是站在属于自己的位置上，认真做着某件事：也许是在排练、调音、整理社团物品，或者安静地和别人说话。\n\n" +
"你停在门口，没有立刻打扰。\n\n" +
"他像是察觉到了什么，抬头看向你。那一瞬间，校园里的声音都变得很远，只剩下你心里一点很轻的紧张。\n\n" +
"“你是……今天转来的同学？”他问。\n\n" +
"这不是偶像剧式的命中注定，更像是普通校园里很小的一次相遇。可也正因为普通，才显得真实。",
[
{text:"点头，礼貌自我介绍。", delta:{love:5, friend:3}},

function saveGame(){
if(!S){
alert("请先开始游戏");
return;
}
localStorage.setItem("riize_campus_love_save", JSON.stringify(S));
el("status").textContent = "已保存";
}

function loadGame(){
var s = localStorage.getItem("riize_campus_love_save");
if(!s){
alert("没有浏览器存档");
return;
}
S = JSON.parse(s);
hideAll();
el("game").classList.remove("hidden");
el("bottom").classList.remove("hidden");
render();
}

function exportSave(){
if(!S){
alert("请先开始游戏");
return;
}
var code = btoa(unescape(encodeURIComponent(JSON.stringify(S))));
el("saveBox").value = code;
el("saveBox").focus();
el("saveBox").select();
alert("存档码已生成，请复制到备忘录。");
}

function importSave(){
var code = el("saveBox").value.trim();
if(!code){
alert("请先粘贴存档码");
return;
}
try{
S = JSON.parse(decodeURIComponent(escape(atob(code))));
localStorage.setItem("riize_campus_love_save", JSON.stringify(S));
hideAll();
el("game").classList.remove("hidden");
el("bottom").classList.remove("hidden");
render();
}catch(e){
alert("存档码无效或复制不完整");
}
}
