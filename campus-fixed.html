<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RIIZE 校园恋爱模拟器 · 修复完整版</title>
<style>
body{margin:0;background:linear-gradient(180deg,#ffe8ef,#fff8ef 50%,#eef7ff);color:#2b2522;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:#fffaf7}
.top{position:sticky;top:0;z-index:5;background:rgba(255,250,247,.95);backdrop-filter:blur(12px);border-bottom:1px solid #eaded6;padding:12px}
h1{font-size:17px;margin:0}.badge{float:right;font-size:11px;border:1px solid #eaded6;border-radius:99px;padding:4px 8px;color:#7b6860}
.tabs{display:flex;gap:6px;margin-top:10px;overflow:auto}.tabs button{white-space:nowrap;font-size:12px;padding:8px 10px;margin:0}
main{padding:14px 12px 86px}.card{background:#fff;border:1px solid #eaded6;border-radius:22px;padding:15px;margin:12px 0;box-shadow:0 16px 40px rgba(52,32,20,.12)}
.cover{height:190px;border-radius:20px;background:radial-gradient(circle at 25% 30%,#ff8aa899,transparent 25%),radial-gradient(circle at 75% 38%,#8fc7ff77,transparent 28%),linear-gradient(135deg,#ffe0ea,#eaf5ff);display:flex;align-items:end;padding:16px;margin-bottom:12px}
.cover b{font-size:20px;line-height:1.25}.small{font-size:12px;color:#887a72;line-height:1.6}
.notice{font-size:12px;line-height:1.6;background:#fff4df;border:1px solid #edd5a7;border-radius:16px;padding:10px;color:#73552b}
label{display:block;font-size:12px;color:#887a72;margin:10px 0 5px}
input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #eaded6;background:#fff;color:#2b2522;border-radius:15px;padding:11px;font-size:15px}
textarea{min-height:82px}
button{width:100%;border:0;border-radius:16px;background:linear-gradient(135deg,#ff8aa4,#ffc06d);color:#321;padding:12px;font-weight:800;font-size:15px;margin-top:9px}
.secondary{background:#fff;color:#6e554b;border:1px solid #eaded6}.ghost{background:transparent;color:#795b50;border:1px dashed #d6bdb2}
.hidden{display:none}.story{white-space:pre-wrap;line-height:1.82;font-size:15.5px}
.choice{background:#fff;color:#302724;border:1px solid #eaded6;text-align:left;line-height:1.55}
.pill{display:inline-block;font-size:11px;border:1px solid #eaded6;border-radius:99px;padding:5px 8px;margin:0 5px 8px 0;color:#765e54}
.stat{margin:10px 0}.stat b{font-size:13px}.num{float:right;color:#887a72;font-size:12px}
.bar{height:8px;background:#f1e3dc;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;background:linear-gradient(90deg,#ff8aa4,#ffc06d)}
.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;max-width:430px;width:100%;background:rgba(255,250,247,.95);border-top:1px solid #eaded6;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px;box-sizing:border-box}
.bottom button{font-size:13px;padding:10px;margin:0}
.person{background:#fff;border:1px solid #eaded6;border-radius:16px;padding:10px;margin:8px 0}
.person span{display:block;color:#887a72;font-size:12px;line-height:1.5;margin-top:5px}
.logitem{border-bottom:1px solid #eaded6;padding:10px 0;color:#8a746a;font-size:12px;line-height:1.5}
</style>
</head>
<body>
<div class="app">
<div class="top">
<h1>RIIZE 校园恋爱模拟器 <span id="status" class="badge">修复版</span></h1>
<div class="tabs">
<button onclick="showPage('game')">剧情</button>
<button onclick="showPage('stats')">好感</button>
<button onclick="showPage('profile')">角色</button>
<button onclick="showPage('save')">存档</button>
</div>
</div>

<main>
<section id="cover" class="card">
<div class="cover"><b>转校第一天、社团招新、雨天林荫道<br>和少年少女的青春悸动</b></div>
<h2>RIIZE 校园恋爱模拟器 · 修复完整版</h2>
<p class="small">平行世界虚构校园文游。剧情、校园关系、恋爱线、人物心理均为虚构创作，不代表现实艺人经历、私生活或真实性格。</p>
<div class="notice">修复版：按固定校园日程推进，不会卡在同一个事件；含文化节、运动会、图书馆、社团、雨天、生日、告白结局。</div>
<button onclick="startCreate()">开始游戏</button>
</section>

<section id="setup" class="card hidden">
<h2>角色创建</h2>
<label>学校名称</label><input id="school" value="圣水艺术高中">
<label>姓名</label><input id="pName" value="77">
<label>转学原因</label><input id="reason" placeholder="例如：父母工作调动 / 追梦 / 家庭原因">
<label>性格</label><select id="personality"><option>温柔内敛</option><option>活泼开朗</option><option>冷静理智</option><option>自定义</option></select>
<label>特长</label><input id="talent" placeholder="绘画 / 文字 / 乐器 / 运动 / 摄影">
<label>学习成绩</label><select id="study"><option>中上，努力型</option><option>年级前列，学霸型</option><option>普通，偏科明显</option><option>刚转学，暂时不稳定</option></select>
<label>家庭背景</label><select id="family"><option>普通家庭</option><option>小康家庭</option><option>艺术家庭</option><option>寄宿/单亲设定</option><option>自定义</option></select>
<label>初始关注男主</label>
<select id="lead">
<option value="shotaro">Shotaro（大﨑将太郎）</option>
<option value="eunseok">Eunseok（宋银硕）</option>
<option value="sungchan">Sungchan（郑成灿）</option>
<option value="wonbin">Wonbin（朴元彬）</option>
<option value="sohee">Sohee（李炤熙）</option>
<option value="anton">Anton（李灿荣）</option>
</select>
<label>补充设定</label><textarea id="extra" placeholder="比如外貌、习惯、性格缺陷、想走甜线/慢热线等。"></textarea>
<button onclick="makeProfile()">确定</button>
</section>

<section id="confirm" class="card hidden"><h2>角色卡</h2><div id="profileText"></div><button onclick="enterGame()">进入剧情</button></section>

<section id="game" class="hidden">
<div class="card"><div id="meta"></div><div id="story" class="story"></div><div id="choices"></div></div>
<div class="card"><h2>自由行动</h2><textarea id="freeText" placeholder="输入你想说的话、想做的事、想去的场景。"></textarea><button onclick="freeAction()">提交</button><button class="secondary" onclick="nextDay()">推进下一天</button></div>
</section>

<section id="stats" class="hidden"><div class="card"><h2>校园状态</h2><div id="statsBox"></div></div><div class="card"><h2>剧情记录</h2><div id="log"></div></div></section>
<section id="profile" class="hidden"><div class="card"><h2>角色卡</h2><div id="profileBox"></div></div></section>
<section id="save" class="hidden"><div class="card"><h2>存档</h2><p class="small">退出来前点“导出存档码”，复制到备忘录。下次粘贴回来点“导入存档码”。</p><button onclick="saveGame()">保存到浏览器</button><button class="secondary" onclick="loadGame()">读取浏览器存档</button><button class="secondary" onclick="exportSave()">导出存档码</button><textarea id="saveBox" placeholder="存档码会出现在这里。"></textarea><button class="ghost" onclick="importSave()">导入存档码</button></div></section>
</main>

<div id="bottom" class="bottom hidden"><button onclick="saveGame()">保存</button><button class="secondary" onclick="exportSave()">导出码</button><button class="ghost" onclick="nextDay()">明天</button></div>
</div>

<script>
var boys={
shotaro:{name:"Shotaro（大﨑将太郎）",cls:"高二（1）班",role:"舞蹈社团主力成员、日韩语双语小能手",tag:"阳光治愈、元气舞者、温柔暖男",desc:"来自日本神奈川，礼貌友善，笑容极具感染力。舞台上气场全开，私下喜欢甜食，心思细腻，会默默照顾别人。"},
eunseok:{name:"Eunseok（宋银硕）",cls:"高二（3）班",role:"班长、声乐社团成员",tag:"毒舌温柔、责任担当",desc:"作为班长认真严谨，外冷内热。表面吐槽你的小马虎，实际会替你整理资料、补习功课，关键时刻站出来。"},
sungchan:{name:"Sungchan（郑成灿）",cls:"高二（1）班",role:"学生会副会长、足球社团主力",tag:"清冷学长、温柔隐忍、外冷内热",desc:"身形挺拔，话不多，看似难接近。其实喜欢小动物，擅长用行动表达关心，会默默守护在意的人。"},
wonbin:{name:"Wonbin（朴元彬）",cls:"高二（3）班",role:"吉他社团社长、视觉担当",tag:"清冷校草、细腻敏感、温柔艺术家",desc:"安静内敛，喜欢摄影和吉他，擅长捕捉细微情绪。看似高冷，实则不擅长拒绝温柔的请求。"},
sohee:{name:"Sohee（李炤熙）",cls:"高二（2）班",role:"声乐社团主唱、吉他手",tag:"温柔学长、治愈主唱、腼腆少年",desc:"气质干净温柔，歌声清澈。私下腼腆，容易脸红，但舞台上唱歌时气场十足。"},
anton:{name:"Anton（李灿荣）",cls:"高二（4）班",role:"器乐社团成员、游泳社团主力",tag:"天才少年、温柔内敛",desc:"气质清冷，擅长钢琴和大提琴，也会游泳。慢热但细腻，会记住你的喜好。"}
};
var S=null;
function el(id){return document.getElementById(id)}
function hideAll(){["cover","setup","confirm","game","stats","profile","save"].forEach(function(id){el(id).classList.add("hidden")})}
function showPage(id){hideAll();if(!S&&id==="game"){el("cover").classList.remove("hidden");return}el(id).classList.remove("hidden")}
function startCreate(){hideAll();el("setup").classList.remove("hidden");el("status").textContent="创建中"}
function currentBoy(){return boys[S.current]}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function loveStage(v){if(v>=81)return"热恋";if(v>=61)return"心动";if(v>=41)return"好感";if(v>=21)return"熟悉";return"陌生"}
function makeProfile(){
var lead=el("lead").value;
S={day:1,scene:"高二（3）班教室",current:lead,player:{school:el("school").value||"圣水艺术高中",name:el("pName").value||"77",reason:el("reason").value||"家庭原因转学到首尔",personality:el("personality").value,talent:el("talent").value||"文字",study:el("study").value,family:el("family").value,extra:el("extra").value||"暂无补充"},love:{shotaro:0,eunseok:0,sungchan:0,wonbin:0,sohee:0,anton:0},mood:72,grades:70,reputation:50,energy:80,friendship:35,log:[]};
S.love[lead]=8;hideAll();el("confirm").classList.remove("hidden");el("status").textContent="角色卡";renderProfile()
}
function renderProfile(){if(!S)return;var b=currentBoy();var html='<div class="person"><b>玩家：'+S.player.name+'</b><span>学校：'+S.player.school+'<br>年级：高二（3）班<br>转学原因：'+S.player.reason+'<br>性格：'+S.player.personality+'<br>特长：'+S.player.talent+'<br>学习成绩：'+S.player.study+'<br>家庭背景：'+S.player.family+'<br>补充：'+S.player.extra+'</span></div>';html+='<div class="person"><b>'+b.name+'</b><span>'+b.cls+'<br>'+b.role+'<br>'+b.tag+'<br><br>'+b.desc+'</span></div>';el("profileText").innerHTML=html;el("profileBox").innerHTML=html}
function enterGame(){hideAll();el("game").classList.remove("hidden");el("bottom").classList.remove("hidden");day1()}
function header(){return"学习状态："+S.grades+" | 校园名声："+S.reputation+" | 心情值："+S.mood+" | 体力："+S.energy+" | 朋友融入度："+S.friendship+"\n第 "+S.day+" 天 | 当前场景："+S.scene+"\n当前聚焦男主："+currentBoy().name+"\n关系阶段："+loveStage(S.love[S.current])+"\n当前好感度："+S.love[S.current]+"/100\n\n"}
function setStory(text,choices){S.story=header()+text;S.choices=choices;S.log.unshift({day:S.day,scene:S.scene,text:text.slice(0,80)});render()}
function render(){
el("status").textContent="第"+S.day+"天";el("meta").innerHTML='<span class="pill">第'+S.day+'天</span><span class="pill">'+S.scene+'</span><span class="pill">'+currentBoy().name+'</span><span class="pill">'+loveStage(S.love[S.current])+'</span>';el("story").textContent=S.story||"";el("choices").innerHTML="";
S.choices.forEach(function(c,i){var btn=document.createElement("button");btn.className="choice";btn.textContent="ABCDE"[i]+". "+c.text;btn.onclick=function(){choose(i)};el("choices").appendChild(btn)});
var stats=[["学习状态",S.grades],["校园名声",S.reputation],["心情值",S.mood],["体力",S.energy],["朋友融入度",S.friendship],["Shotaro",S.love.shotaro],["Eunseok",S.love.eunseok],["Sungchan",S.love.sungchan],["Wonbin",S.love.wonbin],["Sohee",S.love.sohee],["Anton",S.love.anton]];
el("statsBox").innerHTML=stats.map(function(x){return'<div class="stat"><b>'+x[0]+'</b><span class="num">'+x[1]+'/100</span><div class="bar"><div class="fill" style="width:'+x[1]+'%"></div></div></div>'}).join("");
el("log").innerHTML=S.log.map(function(l){return'<div class="logitem"><b>第'+l.day+'天 · '+l.scene+'</b><br>'+l.text+'...</div>'}).join("");renderProfile()
}
function adjust(o){if(o.target)S.current=o.target;if(o.love)S.love[S.current]=Math.max(0,Math.min(100,S.love[S.current]+o.love));if(o.mood)S.mood=Math.max(0,Math.min(100,S.mood+o.mood));if(o.grades)S.grades=Math.max(0,Math.min(100,S.grades+o.grades));if(o.rep)S.reputation=Math.max(0,Math.min(100,S.reputation+o.rep));if(o.energy)S.energy=Math.max(0,Math.min(100,S.energy+o.energy));if(o.friend)S.friendship=Math.max(0,Math.min(100,S.friendship+o.friend))}
function choose(i){var c=S.choices[i];if(c.free){freeAction();return}adjust(c.delta||{});if(c.target)S.current=c.target;if(c.goto){window[c.goto]()}else nextDay()}
function freeAction(){var txt=el("freeText").value.trim();if(!txt){nextDay();return}el("freeText").value="";adjust({love:5,mood:3,friend:2,energy:-2});setStory("你选择了自己的行动：\n\n“"+txt+"”\n\n这个选择让今天的空气变得不一样。不是夸张的命运转折，而是校园生活里最真实的一种靠近：一句话、一个眼神、一次停下来的脚步。\n\n"+currentBoy().name+"没有立刻给出很夸张的反应，却明显把你从“新转学生”这个标签里分离出来，开始记住你自己的样子。",[{text:"继续聊天。",delta:{love:4,mood:2}},{text:"转去完成今天的安排。",delta:{rep:2,friend:2}},{text:"推进到明天。",delta:{}},{text:"查看属性。",delta:{}},{text:"自由行动。",free:true}])}
function day1(){S.scene="高二（3）班教室";setStory("【第1天｜转校第一天】\n\n你转入"+S.player.school+"的第一天，首尔的清晨还带着一点湿冷。班主任把你带到高二（3）班门口，轻轻敲了敲门。教室里原本有些吵闹，门打开的瞬间，几十道目光同时落在你身上。\n\n你站在讲台旁做完自我介绍。性格是“"+S.player.personality+"”，特长是“"+S.player.talent+"”。这些信息看似普通，却会悄悄影响之后的校园关系。\n\n靠窗的空位旁，Eunseok（宋银硕）作为班长把一份校内地图放到你的桌角。他语气淡淡：“课表贴在黑板左侧，别第一天就走错教室。”\n\n听起来像吐槽，但他已经把常用教室都用便签标好了。",[{text:"问Eunseok（宋银硕）课表和流程。",delta:{love:5,friend:5,grades:2,target:"eunseok"},goto:"day2"},{text:"午休去寻找初始关注男主。",delta:{love:8,mood:3},goto:"day2"},{text:"一个人去校园林荫道熟悉环境。",delta:{mood:5,energy:3},goto:"day2"},{text:"去社团招新栏看看。",delta:{rep:5,friend:3},goto:"day2"},{text:"自由行动。",free:true}])}
function day2(){S.day=2;S.scene="社团招新栏";setStory("【第2天｜社团招新】\n\n一楼大厅的社团招新栏被海报贴满。舞蹈社、声乐社、吉他社、器乐社、摄影社、足球社，每张海报都像一条不同的路线。\n\nShotaro（大﨑将太郎）的舞蹈照片贴在最显眼的位置；声乐社的报名表旁写着Eunseok（宋银硕）和Sohee（李炤熙）负责试音；吉他社海报风格极简，角落却有Wonbin（朴元彬）拍的校园照片；器乐社宣传页上，Anton（李灿荣）的大提琴演奏会被标成推荐活动。\n\n你意识到，加入哪个社团，可能会改变之后的校园日常。",[{text:"去舞蹈社看看。",delta:{love:6,energy:-2,target:"shotaro"}},{text:"去声乐社看看。",delta:{love:6,rep:2,target:"sohee"}},{text:"去吉他社看看。",delta:{love:6,rep:2,target:"wonbin"}},{text:"去器乐社看看。",delta:{love:6,rep:2,target:"anton"}},{text:"自由行动。",free:true}])}
function day3(){S.day=3;S.scene="图书馆";setStory("【第3天｜图书馆补习】\n\n转学后的第一次小测比你想象中来得更快。图书馆里只剩下翻书和笔尖划过纸面的声音。\n\n你翻开数学卷子，发现有几道题完全没跟上。就在你准备合上本子喘口气时，有人轻轻敲了敲你的桌角。\n\n“这题不是这么拆的。”\n\n你抬头，看见"+currentBoy().name+"站在旁边。",[{text:"认真请他讲解。",delta:{love:6,grades:8}},{text:"说自己想先独立想一遍。",delta:{grades:4,love:2}},{text:"承认有点焦虑。",delta:{love:5,mood:3}},{text:"转移话题，问他为什么也在图书馆。",delta:{love:4}},{text:"自由行动。",free:true}])}
function day4(){S.day=4;S.scene="校园林荫道 / 雨天";setStory("【第4天｜雨天共伞】\n\n放学时，雨突然落下来。你站在教学楼门口，看着林荫道被雨水打湿，才发现自己忘记带伞。\n\n同学们三三两两离开，校门口便利店的灯牌在雨里变得模糊。\n\n一把伞从旁边伸过来，刚好遮住你头顶的雨。\n\n"+currentBoy().name+"站在你身边，没有催你，只说：“一起走吧。”\n\n这不是告白，也不是轰轰烈烈的剧情。只是一个人看见你被困在雨里，然后选择停下来。",[{text:"走进他的伞下，说谢谢。",delta:{love:8,mood:4}},{text:"怕被同学起哄，有些犹豫。",delta:{love:2,mood:-1}},{text:"问他是不是顺路。",delta:{love:5}},{text:"主动把伞往他那边推一点。",delta:{love:6,mood:2}},{text:"自由行动。",free:true}])}
function day5(){S.day=5;S.scene="操场 / 体育课";setStory("【第5天｜操场上的小伤】\n\n体育课上，你因为不熟悉班级分组，临时被安排去接力。跑到最后一段时，鞋底在塑胶跑道上轻轻打滑，你撑住自己，没有摔倒，却还是扭到了脚。\n\n同学们围过来，你有点尴尬地说没事。\n\n"+currentBoy().name+"却蹲下来，视线落在你的脚踝上：“别硬撑。”\n\n他的语气不重，却让你忽然安静下来。",[{text:"承认有点疼。",delta:{love:6,mood:2}},{text:"逞强说没事。",delta:{energy:-5,love:1}},{text:"请他扶你去医务室。",delta:{love:8,mood:3}},{text:"说谢谢，但让同学陪你。",delta:{secrecy:0,friend:3}},{text:"自由行动。",free:true}])}
function day6(){S.day=6;S.scene="礼堂 / 文化节筹备";setStory("【第6天｜文化节筹备】\n\n文化节进入倒计时。礼堂后台堆满了道具箱，走廊里到处都是排练声和脚步声。\n\n这一天，六位男主都各自忙在自己的位置上：有人排舞，有人试音，有人整理学生会流程，有人调吉他，有人搬乐谱，也有人在操场和礼堂之间来回跑。\n\n你作为转学生，第一次真正被卷入这个学校的集体活动里。",[{text:"帮舞蹈社搬道具。",delta:{love:6,rep:3,energy:-4,target:"shotaro"}},{text:"去声乐社帮忙试音流程。",delta:{love:6,rep:3,target:"sohee"}},{text:"去吉他社布置后台。",delta:{love:6,rep:3,target:"wonbin"}},{text:"去学生会整理流程表。",delta:{love:6,grades:2,target:"eunseok"}},{text:"自由行动。",free:true}])}
function day7(){S.day=7;S.scene="礼堂后台 / 文化节前夜";setStory("【第7天｜文化节前夜】\n\n礼堂灯光只开了一半，后台地面贴着彩色定位胶带。你抱着清单核对道具时，听见舞台上传来最后一遍彩排的声音。\n\n"+currentBoy().name+"站在光的边缘，看起来和平时不太一样。舞台让人发光，也会让人的疲惫无处可藏。\n\n他看见你，朝你走来：“明天会来看吗？”",[{text:"说一定会看。",delta:{love:7,mood:3}},{text:"开玩笑说要看表现。",delta:{love:5,mood:4}},{text:"认真提醒他早点休息。",delta:{love:6,energy:3}},{text:"说自己可能要忙后台。",delta:{rep:3,love:2}},{text:"自由行动。",free:true}])}
function day8(){S.day=8;S.scene="文化节当天 / 礼堂";setStory("【第8天｜文化节当天】\n\n礼堂里坐满了学生。灯光暗下来的瞬间，欢呼声从四面八方涌来。\n\n你站在侧边通道，手里还拿着工作牌。舞台上的"+currentBoy().name+"像换了一个人，平时被藏起来的专注和锋芒，在这一刻全部被灯光照亮。\n\n表演结束后，他从后台出来，额前还有汗，第一眼却在人群里找到了你。",[{text:"举起手里的水，示意他过来。",delta:{love:8,mood:4}},{text:"用口型说：辛苦了。",delta:{love:7,youth:0}},{text:"躲在人群后面，不想太明显。",delta:{love:3,rep:2}},{text:"认真夸他的表演。",delta:{love:8,mood:3}},{text:"自由行动。",free:true}])}
function day9(){S.day=9;S.scene="高二（3）班 / 文化节后";setStory("【第9天｜热帖和起哄】\n\n文化节结束后，班级群和校园论坛都很热闹。有人上传了后台照片，你的背影刚好出现在一张照片边角。\n\n评论里有人问：“旁边那个是不是新转学生？”\n\n原本只是玩笑，可你还是有些不自在。校园里的喜欢没有韩娱世界那样危险，却也会让人被围观、被误解、被起哄。\n\n"+currentBoy().name+"显然也看到了那张照片。",[{text:"假装没看到。",delta:{mood:-1,rep:2}},{text:"问他会不会介意。",delta:{love:5,mood:2}},{text:"主动澄清只是后台工作。",delta:{rep:4,love:1}},{text:"把这当成一次普通插曲。",delta:{mood:3}},{text:"自由行动。",free:true}])}
function day10(){S.day=10;S.scene="周末 / 校园花园";setStory("【第10天｜周末偶遇】\n\n周末的校园安静得不像平时。花园里只有几个学生坐在长椅上背单词。\n\n你原本只是回来拿落下的资料，却在花园长椅旁看见了"+currentBoy().name+"。\n\n他没有穿校服外套，整个人比平时松弛一点。看到你时，他先是一怔，然后笑了下：“你怎么也在？”\n\n这句话很普通，却像是把你们从班级和社团的关系里暂时拎出来，只剩下两个人。",[{text:"说回来拿资料。",delta:{love:4,grades:2}},{text:"坐下来聊一会儿。",delta:{love:8,mood:4}},{text:"问他周末也来学校吗。",delta:{love:5}},{text:"邀请他去便利店买饮料。",delta:{love:7,mood:3}},{text:"自由行动。",free:true}])}
function day11(){S.day=11;S.scene="期中考试前 / 自习室";setStory("【第11天｜期中考试前】\n\n期中考试压得整个年级都有些安静。自习室里，大家的桌上堆满讲义、错题本和便利贴。\n\n你盯着题目看得眼睛发酸。"+currentBoy().name+"坐在你斜前方，像是察觉到你的疲惫，轻轻推过来一颗薄荷糖。\n\n没有纸条，没有多余的话。只有一颗糖和一个很轻的眼神。",[{text:"收下糖，继续学习。",delta:{love:5,grades:5,mood:2}},{text:"小声说谢谢。",delta:{love:6,mood:3}},{text:"把自己的笔记借给他。",delta:{love:6,grades:3}},{text:"问他考完想做什么。",delta:{love:5,mood:2}},{text:"自由行动。",free:true}])}
function day12(){S.day=12;S.scene="考试结束 / 校门口";setStory("【第12天｜考试结束】\n\n最后一门考试结束时，教室里爆发出一阵压低的欢呼。你收拾文具，突然觉得肩膀松了很多。\n\n校门口的风很轻，路边小摊飘来热乎乎的鱼饼味。\n\n"+currentBoy().name+"走在你旁边，像是不经意地问：“考完了，要不要去吃点东西？”\n\n他问得很平常，可你听得出来，他在给你一个放学后同行的机会。",[{text:"答应一起去吃鱼饼。",delta:{love:8,mood:5}},{text:"说今天太累，想先回家。",delta:{mood:3,love:-1}},{text:"问还有没有别人一起。",delta:{friend:3,love:2}},{text:"开玩笑说他请客吗。",delta:{love:6,mood:4}},{text:"自由行动。",free:true}])}
function day13(){S.day=13;S.scene="运动会 / 操场";setStory("【第13天｜运动会】\n\n操场被彩旗和班级横幅填满。广播声、加油声和跑道上的脚步声混在一起，整个校园都像被阳光点亮。\n\n你被临时安排去帮忙递水和登记成绩。人群里，"+currentBoy().name+"看见了你。\n\n这一天的他不再只是社团或教室里的样子，而是混在人群、汗水、笑声和青春噪音里的少年。",[{text:"给他递水加油。",delta:{love:7,mood:3}},{text:"认真完成志愿工作。",delta:{rep:5,friend:3}},{text:"去看最想看的比赛/表演。",delta:{mood:4,energy:-2}},{text:"因为人太多去树荫下休息。",delta:{mood:2,energy:4}},{text:"自由行动。",free:true}])}
function day14(){S.day=14;S.scene="放学后 / 医务室门口";setStory("【第14天｜小小照顾】\n\n运动会后，你因为跑来跑去帮忙，腿酸得厉害。放学时，你站在楼梯口慢慢下台阶。\n\n"+currentBoy().name+"从后面走来，脚步停了一下。\n\n“还疼？”\n\n他没有直接伸手扶你，只是放慢速度，走在你身侧。那种照顾没有让人难堪，却让你心里微微一软。",[{text:"说还有一点疼。",delta:{love:6,mood:2}},{text:"说没事，但跟着他的速度走。",delta:{love:4}},{text:"问他怎么发现的。",delta:{love:5,mood:2}},{text:"故意说你走慢点。",delta:{love:7,mood:4}},{text:"自由行动。",free:true}])}
function day15(){S.day=15;S.scene="生日 / 放学后的教室";setStory("【第15天｜生日卡片】\n\n你原本以为转学后的第一个生日会很普通。\n\n放学后，教室里的人慢慢散去。你收拾书包时，在桌洞里发现了一张小小的卡片。上面没有署名，只写着一句话：\n\n“生日快乐。希望你在这里，也能慢慢拥有喜欢的日子。”\n\n字迹很克制，却很认真。\n\n你抬头时，看见"+currentBoy().name+"正站在门口，像是路过，又不像只是路过。",[{text:"拿着卡片去问是不是他写的。",delta:{love:8,mood:4}},{text:"装作没发现，但偷偷笑了。",delta:{mood:5,love:4}},{text:"认真道谢。",delta:{love:6}},{text:"邀请他一起去便利店买饮料。",delta:{love:7,mood:3}},{text:"自由行动。",free:true}])}
function day16(){S.day=16;S.scene="社团活动室 / 委托任务";setStory("【第16天｜专属委托】\n\n因为你和"+currentBoy().name+"的关系逐渐从陌生变得熟悉，今天放学后，你在社团活动室遇见了他。\n\n他似乎正为一件小事困扰。不是严重到需要求助的麻烦，却刚好是你可以帮得上忙的那种校园日常。\n\n如果完成委托，你将获得一段更靠近他的机会。",[{text:"主动表示可以帮忙。",delta:{love:10,rep:3}},{text:"先问清楚具体情况。",delta:{love:6,grades:2}},{text:"开玩笑说需要一点谢礼。",delta:{love:7,mood:3}},{text:"婉拒，今天想先休息。",delta:{mood:4,love:-2}},{text:"自由行动。",free:true}])}
function day17(){S.day=17;S.scene="校园凉亭 / 黄昏";setStory("【第17天｜第一次谈心】\n\n黄昏时，校园凉亭附近的风变得很轻。你们坐在长椅两端，中间隔着一只书包的距离。\n\n"+currentBoy().name+"低头看着地面，忽然说：“你转来之后，好像一直很努力。”\n\n这句话让你有点意外。原来那些你以为没人看见的适应、紧张、逞强和小心翼翼，都有人安静地记在心里。",[{text:"承认自己其实有点辛苦。",delta:{love:8,mood:4}},{text:"说还好，已经习惯了。",delta:{love:3,energy:-2}},{text:"反问他是不是也很辛苦。",delta:{love:7,mood:2}},{text:"开玩笑说你观察力太好了吧。",delta:{love:5,mood:3}},{text:"自由行动。",free:true}])}
function day18(){S.day=18;S.scene="冬日校门口";setStory("【第18天｜放学同行】\n\n冬天来得很突然。校门口的风带着一点冷意，学生们把围巾拉高，三三两两往便利店和公交站走。\n\n"+currentBoy().name+"走在你旁边，肩膀偶尔和你隔着校服袖口轻轻擦过。\n\n你们没有说很多话，却也没有尴尬。某些关系就是这样，走到一定距离后，沉默也会变得安稳。",[{text:"主动找话题。",delta:{love:5,mood:3}},{text:"安静一起走。",delta:{love:6,mood:2}},{text:"问他以后想去哪里读大学。",delta:{love:6,grades:2}},{text:"把围巾分他一点。",delta:{love:8,mood:4}},{text:"自由行动。",free:true}])}
function day19(){S.day=19;S.scene="圣诞节 / 校园钢琴旁";setStory("【第19天｜圣诞节】\n\n校园里挂起了小灯。礼堂旁的钢琴被学生会临时搬出来，旁边堆着彩带和圣诞卡片。\n\n你路过时，听见一段很轻的旋律。\n\n"+currentBoy().name+"站在灯光下，看见你后停了停：“要听完吗？”\n\n那一瞬间，冬天好像也没有那么冷。",[{text:"坐下来听。",delta:{love:8,mood:5}},{text:"问这首歌叫什么。",delta:{love:5}},{text:"轻声跟着哼。",delta:{love:7,mood:4}},{text:"递给他一张圣诞卡。",delta:{love:9,mood:5}},{text:"自由行动。",free:true}])}
function day20(){S.day=20;S.scene="毕业季前 / 天台";setStory("【第20天｜天台告白前夜】\n\n毕业季的气息开始变浓。天台风很大，你们站在栏杆边，看着操场上的灯一盏盏亮起来。\n\n"+currentBoy().name+"沉默了很久，终于开口：\n\n“如果以后不在同一个地方，你会忘记这里吗？”\n\n你知道，他真正想问的不是校园，而是他自己。",[{text:"说不会忘记。",delta:{love:7,mood:3}},{text:"说重要的人不会因为距离消失。",delta:{love:10,mood:4}},{text:"问他是不是害怕分开。",delta:{love:8}},{text:"说未来还没有发生，先看眼前。",delta:{mood:3,love:4}},{text:"自由行动。",free:true}])}
function day21(){S.day=21;S.scene="最终选择 / 校园林荫道";ending()}
function nextDay(){var n=S.day+1;var fn=window["day"+n];if(fn)fn();else ending()}
function ending(){var v=S.love[S.current],b=currentBoy().name;var title="普通青春结局";if(v>=81)title="HE：双向奔赴";else if(v>=61)title="BE/OE：没有说出口的喜欢";else if(v>=41)title="友情以上未满";setStory("【"+title+"】\n\n这段转学后的校园生活终于走到一个节点。\n\n你记得第一天站在讲台旁的紧张，记得社团招新栏前那些选择，记得雨天共伞、文化节灯光、图书馆薄荷糖、生日卡片和天台的风。\n\n"+b+"不是突然闯进你生活的奇迹，而是在一个个普通日子里慢慢变得重要的人。\n\n如果你们走到恋爱，那不是命中注定，而是彼此看见、靠近、努力后的结果。\n如果没有，也并不是失败。青春里有些喜欢，本来就像阳光落在校服袖口上，短暂、明亮，却足够让人记很久。",[{text:"导出存档码。",delta:{}},{text:"查看角色卡。",delta:{}},{text:"补写最终独白。",delta:{mood:3}},{text:"自由行动：结局后续。",free:true},{text:"重新开始请刷新页面。",delta:{}}])}
function saveGame(){if(!S){alert("请先开始游戏");return}localStorage.setItem("riize_campus_fixed",JSON.stringify(S));el("status").textContent="已保存"}
function loadGame(){var s=localStorage.getItem("riize_campus_fixed");if(!s){alert("没有浏览器存档");return}S=JSON.parse(s);hideAll();el("game").classList.remove("hidden");el("bottom").classList.remove("hidden");render()}
function exportSave(){if(!S){alert("请先开始游戏");return}var code=btoa(unescape(encodeURIComponent(JSON.stringify(S))));el("saveBox").value=code;el("saveBox").focus();el("saveBox").select();alert("存档码已生成，请复制到备忘录。")}
function importSave(){var code=el("saveBox").value.trim();if(!code){alert("请先粘贴存档码");return}try{S=JSON.parse(decodeURIComponent(escape(atob(code))));localStorage.setItem("riize_campus_fixed",JSON.stringify(S));hideAll();el("game").classList.remove("hidden");el("bottom").classList.remove("hidden");render()}catch(e){alert("存档码无效或复制不完整")}}
</script>
</body>
</html>
